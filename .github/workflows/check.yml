name: check

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install UI dependencies
        run: npm ci --prefix ui

      - name: Print tool versions
        run: |
          python --version
          node --version
          pip --version

      - name: Run project checks
        run: make check
